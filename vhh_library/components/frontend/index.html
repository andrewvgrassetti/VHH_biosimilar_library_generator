<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, Helvetica, sans-serif; overflow-x: hidden; overflow-y: hidden; }
  #scroll-wrapper { width: 100%; overflow-x: auto; overflow-y: hidden; padding-bottom: 4px; }
  #container { display: inline-block; padding: 6px 4px 4px 4px; user-select: none; -webkit-user-select: none; min-width: max-content; }
  #annotations { position: relative; height: 36px; white-space: nowrap; min-width: max-content; }
  .region-label { position: absolute; font-size: 9px; font-weight: 700; text-align: center; pointer-events: none; }
  .region-bracket { position: absolute; bottom: 0; height: 6px; border-left: 2px solid; border-right: 2px solid; border-bottom: 2px solid; pointer-events: none; }
  #sequence-row { display: flex; white-space: nowrap; cursor: pointer; }
  .residue { display: inline-flex; align-items: center; justify-content: center; width: 12px; height: 22px; font-family: "Courier New", monospace; font-size: 10px; font-weight: 600; border: 0.5px solid #ccc; transition: opacity 0.1s; position: relative; flex-shrink: 0; }
  .residue:hover { outline: 2px solid #1976D2; outline-offset: -2px; z-index: 2; }
  .residue.frozen { opacity: 1; }
  .residue.frozen::after { content: ""; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.40); pointer-events: none; }
  .residue.conservative::before { content: ""; position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: #FF6F00; pointer-events: none; z-index: 3; }
  #ticks { display: flex; white-space: nowrap; height: 14px; position: relative; }
  .tick { display: inline-flex; align-items: flex-start; justify-content: center; width: 12px; font-size: 7px; color: #999; flex-shrink: 0; }
  #legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; font-size: 9px; color: #555; }
  .legend-item { display: flex; align-items: center; gap: 3px; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 2px; border: 1px solid #bbb; flex-shrink: 0; }
  .legend-swatch.frozen-swatch { position: relative; overflow: hidden; background: #E3F2FD; }
  .legend-swatch.frozen-swatch::after { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.40); }
  .legend-swatch.conservative-swatch { position: relative; background: #FFF3E0; border-color: #FF6F00; }
  .legend-swatch.conservative-swatch::after { content: ""; position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; border-radius: 50%; background: #FF6F00; }
  #tooltip { display: none; position: fixed; background: #333; color: #fff; font-size: 11px; padding: 4px 8px; border-radius: 4px; pointer-events: none; z-index: 100; white-space: nowrap; }
</style>
</head>
<body>
<div id="scroll-wrapper">
<div id="container">
  <div id="annotations"></div>
  <div id="sequence-row"></div>
  <div id="ticks"></div>
  <div id="legend"></div>
</div>
</div>
<div id="tooltip"></div>

<script>
function sendMessageToStreamlitClient(type, data) {
  var outData = Object.assign({isStreamlitMessage: true, type: type}, data);
  window.parent.postMessage(outData, "*");
}

var Streamlit = {
  setComponentReady: function() { sendMessageToStreamlitClient("streamlit:componentReady", {apiVersion: 1}); },
  setFrameHeight: function(height) { sendMessageToStreamlitClient("streamlit:setFrameHeight", {height: height}); },
  setComponentValue: function(value) { sendMessageToStreamlitClient("streamlit:setComponentValue", {value: value}); }
};

/* positionClassMap: position string → "frozen" | "conservative" | "mutable" */
var positionClassMap = {};
var imgtPositionsList = [];
var regions = [];
var notablePositions = {};
var seqLen = 0;
var isDragging = false;
var dragStart = -1;
var dragTargetClass = "";
var pendingUpdate = false;

/* Three-state cycle order: mutable → frozen → conservative → mutable */
var CLASS_CYCLE = {"mutable": "frozen", "frozen": "conservative", "conservative": "mutable"};

/** Extract the integer portion of an IMGT key, e.g. "111A" → 111. */
function imgtKeyInt(key) {
  var m = key.match(/^(\d+)/);
  return m ? parseInt(m[1], 10) : 0;
}

function getPosClass(pos) {
  return positionClassMap[pos] || "mutable";
}

function setPosClass(pos, cls) {
  if (cls === "mutable") {
    delete positionClassMap[pos];
  } else {
    positionClassMap[pos] = cls;
  }
}

function render() {
  var CELL_W = 12;
  var annotDiv = document.getElementById("annotations");
  var seqDiv = document.getElementById("sequence-row");
  var tickDiv = document.getElementById("ticks");
  var legendDiv = document.getElementById("legend");
  annotDiv.innerHTML = ""; seqDiv.innerHTML = ""; tickDiv.innerHTML = "";

  annotDiv.style.width = (seqLen * CELL_W) + "px";

  /* --- Region brackets: find first/last cell index for each region --- */
  for (var r = 0; r < regions.length; r++) {
    var reg = regions[r];
    var firstIdx = -1, lastIdx = -1;
    for (var ci = 0; ci < seqLen; ci++) {
      var num = imgtKeyInt(imgtPositionsList[ci][0]);
      if (num >= reg.start && num <= reg.end) {
        if (firstIdx === -1) firstIdx = ci;
        lastIdx = ci;
      }
    }
    if (firstIdx === -1) continue;
    var x1 = firstIdx * CELL_W, x2 = (lastIdx + 1) * CELL_W, midX = (x1 + x2) / 2;
    var lbl = document.createElement("span");
    lbl.className = "region-label"; lbl.style.left = midX + "px"; lbl.style.transform = "translateX(-50%)";
    lbl.style.top = "2px"; lbl.style.color = reg.labelColor; lbl.textContent = reg.name;
    annotDiv.appendChild(lbl);
    var brk = document.createElement("div");
    brk.className = "region-bracket"; brk.style.left = x1 + "px"; brk.style.width = (x2 - x1) + "px";
    brk.style.borderColor = reg.labelColor; annotDiv.appendChild(brk);
  }

  /* --- Residue cells --- */
  for (var i = 0; i < seqLen; i++) {
    var pos = imgtPositionsList[i][0];   /* IMGT string key */
    var aa  = imgtPositionsList[i][1];   /* amino acid */
    var posInt = imgtKeyInt(pos);
    var cell = document.createElement("span");
    cell.className = "residue"; cell.dataset.pos = pos; cell.textContent = aa;
    var bgColor = "#F5F5F5";
    for (var r2 = 0; r2 < regions.length; r2++) {
      if (posInt >= regions[r2].start && posInt <= regions[r2].end) { bgColor = regions[r2].color; break; }
    }
    if (notablePositions[pos]) { bgColor = notablePositions[pos].bg; cell.style.color = notablePositions[pos].fg; }
    cell.style.backgroundColor = bgColor; cell.style.borderColor = "#CCC";
    var cls = getPosClass(pos);
    if (cls === "frozen") cell.classList.add("frozen");
    if (cls === "conservative") cell.classList.add("conservative");
    cell.addEventListener("mousedown", onCellMouseDown);
    cell.addEventListener("mouseenter", onCellMouseEnter);
    cell.addEventListener("mouseover", onCellHover);
    cell.addEventListener("mouseout", onCellOut);
    seqDiv.appendChild(cell);
  }

  /* --- Tick marks --- */
  for (var t = 0; t < seqLen; t++) {
    var tKey = imgtPositionsList[t][0];
    var tInt = imgtKeyInt(tKey);
    var tk = document.createElement("span"); tk.className = "tick";
    if (t === 0 || tInt % 10 === 0) tk.textContent = tKey;
    tickDiv.appendChild(tk);
  }

  legendDiv.innerHTML = "";
  var items = [
    {label: "FR region", color: "#E3F2FD", border: "#90CAF9"},
    {label: "CDR region", color: "#FFCDD2", border: "#EF9A9A"},
    {label: "Cys (disulfide)", color: "#FFD600", border: "#FFD600"},
    {label: "Trp (VHH hallmark)", color: "#AB47BC", border: "#AB47BC"},
    {label: "Frozen", cls: "frozen-swatch"},
    {label: "Conservative", cls: "conservative-swatch"},
  ];
  for (var li = 0; li < items.length; li++) {
    var it = items[li];
    var div = document.createElement("span"); div.className = "legend-item";
    var sw = document.createElement("span"); sw.className = "legend-swatch" + (it.cls ? " " + it.cls : "");
    if (it.color) { sw.style.background = it.color; sw.style.borderColor = it.border || it.color; }
    div.appendChild(sw);
    var txt = document.createElement("span"); txt.textContent = it.label;
    div.appendChild(txt); legendDiv.appendChild(div);
  }
  Streamlit.setFrameHeight(document.getElementById("scroll-wrapper").scrollHeight + 14);
}

function onCellMouseDown(e) {
  e.preventDefault();
  var pos = e.currentTarget.dataset.pos;
  var currentClass = getPosClass(pos);
  var nextClass = CLASS_CYCLE[currentClass] || "frozen";
  isDragging = true; dragStart = pos;
  dragTargetClass = nextClass;
  setPosClass(pos, nextClass);
  render();
}

function onCellMouseEnter(e) {
  if (!isDragging) return;
  var pos = e.currentTarget.dataset.pos;
  setPosClass(pos, dragTargetClass);
  render();
}

document.addEventListener("mouseup", function() {
  if (isDragging) {
    isDragging = false; dragStart = -1;
    pendingUpdate = true;
    /* Build sorted arrays for frozen and conservative positions */
    var frozen = [];
    var conservative = [];
    for (var key in positionClassMap) {
      if (positionClassMap[key] === "frozen") frozen.push(key);
      else if (positionClassMap[key] === "conservative") conservative.push(key);
    }
    var sortFn = function(a, b) {
      var ai = imgtKeyInt(a), bi = imgtKeyInt(b);
      if (ai !== bi) return ai - bi;
      return a < b ? -1 : (a > b ? 1 : 0);
    };
    frozen.sort(sortFn);
    conservative.sort(sortFn);
    Streamlit.setComponentValue({frozen: frozen, conservative: conservative});
  }
});

function onCellHover(e) {
  var pos = e.currentTarget.dataset.pos;
  var aa = "";
  for (var k = 0; k < imgtPositionsList.length; k++) {
    if (imgtPositionsList[k][0] === pos) { aa = imgtPositionsList[k][1]; break; }
  }
  var posInt = imgtKeyInt(pos);
  var regionName = "";
  for (var r = 0; r < regions.length; r++) {
    if (posInt >= regions[r].start && posInt <= regions[r].end) { regionName = regions[r].name; break; }
  }
  var cls = getPosClass(pos);
  var tip = "IMGT " + pos + " (" + regionName + ") \u2014 " + aa;
  if (cls === "frozen") tip += " [FROZEN]";
  else if (cls === "conservative") tip += " [CONSERVATIVE]";
  if (notablePositions[pos]) tip += " \u2022 " + notablePositions[pos].label;
  var tooltip = document.getElementById("tooltip");
  tooltip.textContent = tip; tooltip.style.display = "block";
  tooltip.style.left = (e.clientX + 10) + "px"; tooltip.style.top = (e.clientY - 28) + "px";
}

function onCellOut() { document.getElementById("tooltip").style.display = "none"; }

function onStreamlitRender(event) {
  var args = event.detail ? event.detail.args : event.data.args;
  if (!args) return;
  imgtPositionsList = args.imgtPositionsList || [];
  regions = args.regions || []; notablePositions = args.notablePositions || {};
  seqLen = imgtPositionsList.length;

  if (pendingUpdate) {
    /* User just made a change — keep local positionClassMap, don't reset from args. */
    pendingUpdate = false;
  } else {
    /* No pending local changes — sync from Python's authoritative state. */
    positionClassMap = {};
    var frozenList = args.frozenPositions || [];
    var conservativeList = args.conservativePositions || [];
    for (var i = 0; i < frozenList.length; i++) {
      positionClassMap[frozenList[i]] = "frozen";
    }
    for (var j = 0; j < conservativeList.length; j++) {
      positionClassMap[conservativeList[j]] = "conservative";
    }
  }
  render();
}

window.addEventListener("message", function(event) {
  if (event.data.type === "streamlit:render") onStreamlitRender({detail: {args: event.data.args}});
});

Streamlit.setComponentReady();
</script>
</body>
</html>
