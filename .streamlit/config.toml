# Defense-in-depth: generous server settings to support long-running
# background tasks.  The background worker pattern in
# vhh_library/background.py is the primary mitigation; these settings are
# a safety net.
#
# NOTE: server.pingTimeout and server.scriptRunnerCommandTimeout were
# removed in recent Streamlit versions.  For longer disconnects,
# background.py persists results to disk and app.py recovers them on the
# next session init.

[server]
maxMessageSize = 500
enableWebsocketCompression = false

[runner]
fastReruns = true
